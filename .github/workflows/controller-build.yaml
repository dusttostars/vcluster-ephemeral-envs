name: Build Controller

on:
  push:
    branches: [master]
    paths:
      - 'cmd/controller/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile.controller'

jobs:
  build:
    runs-on: arc-runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure insecure registry and build
        run: |
          echo '{"insecure-registries":["localhost:32000"]}' | sudo tee /etc/docker/daemon.json
          sudo kill -TERM $(cat /var/run/docker.pid 2>/dev/null || pgrep -x dockerd) 2>/dev/null || true
          sleep 2
          sudo dockerd > /dev/null 2>&1 &
          for i in $(seq 1 30); do docker info > /dev/null 2>&1 && break; sleep 1; done

          docker build -t localhost:32000/controller:latest -f Dockerfile.controller .
          docker push localhost:32000/controller:latest

      - name: Restart controller deployment
        run: |
          kubectl rollout restart deployment cleanup-controller -n ephemeral-system
          kubectl rollout status deployment cleanup-controller -n ephemeral-system --timeout=120s
