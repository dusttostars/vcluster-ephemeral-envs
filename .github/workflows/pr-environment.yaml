name: PR Ephemeral Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'cmd/dashboard/**'
      - 'Dockerfile.dashboard'
      - '.github/workflows/pr-environment.yaml'

jobs:
  create-env:
    runs-on: arc-runner-set
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract branch info
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          ENV_NAME="${BRANCH//\//-}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Determine tenant from label
        id: tenant
        run: |
          TENANT="default"
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          MATCH=$(echo "$LABELS" | grep -oP 'tenant:\K[^"]+' || true)
          if [ -n "$MATCH" ]; then
            TENANT="$MATCH"
          fi
          echo "tenant=$TENANT" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.container-registry.svc.cluster.local:5000"]
              http = true
              insecure = true

      - name: Compute image tags
        id: build
        run: |
          TAG="pr-${{ steps.branch.outputs.env_name }}"
          echo "push_ref=registry.container-registry.svc.cluster.local:5000/dashboard:${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=localhost:32000/dashboard:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: ${{ steps.build.outputs.push_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.1

      - name: Build CLI for rendering CR
        run: |
          go build -o /tmp/ephemeral ./cmd/cli

      - name: Apply EphemeralEnvironment CR
        run: |
          /tmp/ephemeral env render \
            --tenant "${{ steps.tenant.outputs.tenant }}" \
            --branch "${{ steps.branch.outputs.branch }}" \
            --ttl 2h \
            --image "${{ steps.build.outputs.image }}" \
            --port 8090 \
          | kubectl apply -f -

      - name: Comment PR with environment info
        uses: actions/github-script@v7
        with:
          script: |
            const tenant = '${{ steps.tenant.outputs.tenant }}';
            const envName = '${{ steps.branch.outputs.env_name }}';
            const image  = '${{ steps.build.outputs.image }}';
            const ns = `tenant-${tenant}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## :rocket: Ephemeral Environment Ready\n\n` +
                    `| Field | Value |\n|---|---|\n` +
                    `| **Name** | \`${envName}\` |\n` +
                    `| **Tenant** | \`${tenant}\` |\n` +
                    `| **Namespace** | \`${ns}\` |\n` +
                    `| **Image** | \`${image}\` |\n` +
                    `| **TTL** | 2h |\n\n` +
                    `**Connect to the vcluster and browse the dashboard:**\n` +
                    `\`\`\`bash\n` +
                    `vcluster connect vcluster-${envName} -n ${ns}\n` +
                    `kubectl port-forward svc/${envName} 9090:80\n` +
                    `# open http://localhost:9090\n` +
                    `\`\`\`\n`
            });
