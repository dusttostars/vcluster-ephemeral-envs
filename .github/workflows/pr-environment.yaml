name: PR Ephemeral Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  create-env:
    runs-on: arc-runner-set
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract branch info
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          ENV_NAME="${BRANCH//\//-}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Determine tenant from label
        id: tenant
        run: |
          # Default tenant; override with PR label "tenant:<name>"
          TENANT="default"
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          MATCH=$(echo "$LABELS" | grep -oP 'tenant:\K[^"]+' || true)
          if [ -n "$MATCH" ]; then
            TENANT="$MATCH"
          fi
          echo "tenant=$TENANT" >> "$GITHUB_OUTPUT"

      - name: Ensure tenant exists
        run: |
          bash scripts/create-tenant.sh "${{ steps.tenant.outputs.tenant }}" || true

      - name: Create ephemeral environment
        run: |
          bash scripts/create-env.sh \
            "${{ steps.tenant.outputs.tenant }}" \
            "${{ steps.branch.outputs.branch }}" \
            "2h"

      - name: Create environment via Dashboard API
        id: create
        run: |
          TENANT="${{ steps.tenant.outputs.tenant }}"
          ENV_NAME="${{ steps.branch.outputs.env_name }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          DASHBOARD="http://dashboard.ephemeral-system.svc.cluster.local:8090"

          echo "Creating environment via dashboard API..."
          curl -sf -X POST "${DASHBOARD}/api/environments" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${ENV_NAME}\",\"tenant\":\"${TENANT}\",\"branch\":\"${BRANCH}\",\"ttl\":\"2h\"}" \
            --connect-timeout 5 --max-time 30 2>&1 || {
            echo "::notice::Dashboard not reachable, relying on ArgoCD sync."
          }

      - name: Wait for vCluster to be ready
        run: |
          TENANT="${{ steps.tenant.outputs.tenant }}"
          ENV_NAME="${{ steps.branch.outputs.env_name }}"
          DASHBOARD="http://dashboard.ephemeral-system.svc.cluster.local:8090"

          echo "Waiting for vcluster ${ENV_NAME} to be Running..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "${DASHBOARD}/api/environments" --max-time 5 2>/dev/null \
              | python3 -c "import json,sys; envs=json.load(sys.stdin); matches=[e for e in envs if e['name']=='${ENV_NAME}']; print(matches[0]['status'] if matches else 'NotFound')" 2>/dev/null || echo "Unreachable")

            echo "  Attempt $i/30: status=$STATUS"
            if [ "$STATUS" = "Running" ]; then
              echo "vCluster is running!"
              sleep 5
              exit 0
            fi
            sleep 10
          done
          echo "::warning::vCluster not ready after 5 minutes. Deploy step will still attempt."

      - name: Build and deploy app
        id: deploy
        run: |
          TENANT="${{ steps.tenant.outputs.tenant }}"
          ENV_NAME="${{ steps.branch.outputs.env_name }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          DASHBOARD="http://dashboard.ephemeral-system.svc.cluster.local:8090"

          DEPLOY_URL="${DASHBOARD}/api/environments/${TENANT}/${ENV_NAME}/deploy"
          echo "Deploying branch ${BRANCH} into ${ENV_NAME}..."

          RESPONSE=$(curl -sf -X POST "$DEPLOY_URL" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":\"${BRANCH}\",\"namespace\":\"default\"}" \
            --connect-timeout 5 \
            --max-time 300 2>&1) && {
            echo "Deploy response: $RESPONSE"
            echo "deploy_status=success" >> "$GITHUB_OUTPUT"
          } || {
            echo "::warning::Auto-deploy failed. You can deploy manually from the dashboard."
            echo "deploy_status=failed" >> "$GITHUB_OUTPUT"
          }

      - name: Comment PR with environment info
        uses: actions/github-script@v7
        with:
          script: |
            const tenant = '${{ steps.tenant.outputs.tenant }}';
            const envName = '${{ steps.branch.outputs.env_name }}';
            const branch = '${{ steps.branch.outputs.branch }}';
            const ns = `tenant-${tenant}`;
            const deployStatus = '${{ steps.deploy.outputs.deploy_status }}';
            const appUrl = `http://dashboard.local/app/${tenant}/${envName}/`;
            const deployInfo = deployStatus === 'success'
              ? `| **App** | :white_check_mark: [Open app](${appUrl}) — deployed from \`${branch}\` |\n`
              : `| **App** | :warning: Deploy pending — [open dashboard](http://dashboard.local) |\n`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## :rocket: Ephemeral Environment Ready\n\n` +
                    `| Field | Value |\n|---|---|\n` +
                    `| **Name** | \`${envName}\` |\n` +
                    `| **Tenant** | \`${tenant}\` |\n` +
                    `| **Namespace** | \`${ns}\` |\n` +
                    `| **TTL** | 2h |\n` +
                    deployInfo + `\n` +
                    `**Connect:**\n` +
                    `\`\`\`bash\n` +
                    `vcluster connect vcluster-${envName} -n ${ns}\n` +
                    `kubectl port-forward svc/app-${envName} 9090:80\n` +
                    `# Open http://localhost:9090\n` +
                    `\`\`\`\n`
            });
