name: PR Environment Cleanup

on:
  pull_request:
    types: [closed]

jobs:
  delete-env:
    runs-on: arc-runner-set
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Extract branch info
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          ENV_NAME="${BRANCH//\//-}"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Determine tenant from label
        id: tenant
        run: |
          TENANT="default"
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          MATCH=$(echo "$LABELS" | grep -oP 'tenant:\K[^"]+' || true)
          if [ -n "$MATCH" ]; then
            TENANT="$MATCH"
          fi
          echo "tenant=$TENANT" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build CLI
        run: go build -o /tmp/ephemeral ./cmd/cli

      - name: Delete EphemeralEnvironments for this PR
        run: |
          /tmp/ephemeral env delete \
            --tenant "${{ steps.tenant.outputs.tenant }}" \
            --suffix "${{ steps.branch.outputs.env_name }}"

      - name: Comment PR with cleanup info
        uses: actions/github-script@v7
        with:
          script: |
            const envName = '${{ steps.branch.outputs.env_name }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Ephemeral Environment Removed\n\n` +
                    `\`${envName}\` has been deleted. The controller's finalizer will ` +
                    `tear down the vcluster Argo Application.`
            });
