name: Apps Ephemeral Envs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/**'
      - '.github/workflows/apps-env.yaml'

jobs:
  detect:
    runs-on: arc-runner-set
    outputs:
      apps: ${{ steps.changed.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changed
        run: |
          BASE="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=50 origin "${{ github.base_ref }}"
          APPS=$(git diff --name-only "$BASE"...HEAD -- 'apps/' \
                  | awk -F/ '{print $2}' | sort -u \
                  | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "detected apps: $APPS"
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: detect
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    runs-on: arc-runner-set
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract env info
        id: env
        run: |
          BRANCH="${{ github.head_ref }}"
          SAFE_BRANCH="${BRANCH//\//-}"
          ENV_NAME="${{ matrix.app }}-${SAFE_BRANCH}"
          echo "branch=$BRANCH"       >> "$GITHUB_OUTPUT"
          echo "safe_branch=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "env_name=$ENV_NAME"   >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."localhost:32000"]
              http = true
              insecure = true

      - name: Compute image tag
        id: build
        run: |
          TAG="localhost:32000/${{ matrix.app }}:pr-${{ steps.env.outputs.safe_branch }}"
          echo "image=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app }}
          push: true
          tags: ${{ steps.build.outputs.image }}

      - name: Build CLI
        run: go build -o /tmp/ephemeral ./cmd/cli

      - name: Apply EphemeralEnvironment CR
        run: |
          /tmp/ephemeral env render \
            --tenant default \
            --branch "${{ steps.env.outputs.env_name }}" \
            --ttl 1h \
            --image "${{ steps.build.outputs.image }}" \
            --port 80 \
          | kubectl apply -f -

      - name: Comment PR with env info
        uses: actions/github-script@v7
        with:
          script: |
            const app     = '${{ matrix.app }}';
            const envName = '${{ steps.env.outputs.env_name }}';
            const image   = '${{ steps.build.outputs.image }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## :rocket: \`${app}\` ephemeral env ready\n\n` +
                    `| Field | Value |\n|---|---|\n` +
                    `| **Env** | \`${envName}\` |\n` +
                    `| **Image** | \`${image}\` |\n` +
                    `| **TTL** | 1h |\n\n` +
                    `Browse via the dashboard proxy: \`/app/default/${envName}/\``
            });
