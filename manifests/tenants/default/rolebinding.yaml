apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default-tenant-binding
  namespace: tenant-default
subjects:
  - kind: Group
    name: "tenant:default"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: default-tenant-role
