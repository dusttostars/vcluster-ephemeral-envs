apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vcluster-feat-test
  namespace: argocd
  labels:
    ephemeral.io/tenant: "team-a"
    ephemeral.io/branch: "feat-test"
    ephemeral.io/ttl: "2h"
    ephemeral.io/created-at: "20260410T210000Z"
    ephemeral.io/managed-by: "ephemeral-controller"
  annotations:
    ephemeral.io/created-at: "2026-04-10T21:00:00Z"
spec:
  project: tenant-team-a
  source:
    repoURL: https://charts.loft.sh
    chart: vcluster
    targetRevision: "0.19.*"
    helm:
      values: |
        syncer:
          extraArgs:
            - --name=feat-test
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        vcluster:
          image: rancher/k3s:v1.29.1-k3s2
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
        sync:
          ingresses:
            enabled: true
          services:
            enabled: true
        coredns:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: tenant-team-a
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
