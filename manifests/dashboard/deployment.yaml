apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: ephemeral-system
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      serviceAccountName: dashboard
      containers:
        - name: dashboard
          image: localhost:32000/dashboard:latest
          imagePullPolicy: Always
          args:
            - --addr=:8090
            - --github-repo=dusttostars/vcluster-ephemeral-envs
          env:
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: dashboard-github-token
                  key: token
          ports:
            - containerPort: 8090
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 256Mi }
