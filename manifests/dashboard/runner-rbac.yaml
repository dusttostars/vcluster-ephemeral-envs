apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-deployer
  namespace: ephemeral-system
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arc-runner-dashboard-deployer
  namespace: ephemeral-system
subjects:
  - kind: ServiceAccount
    name: arc-runner-set-gha-rs-no-permission
    namespace: arc-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dashboard-deployer
