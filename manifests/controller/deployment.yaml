apiVersion: apps/v1
kind: Deployment
metadata:
  name: cleanup-controller
  namespace: ephemeral-system
  labels:
    app: cleanup-controller
    ephemeral.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cleanup-controller
  template:
    metadata:
      labels:
        app: cleanup-controller
    spec:
      serviceAccountName: cleanup-controller
      containers:
        - name: controller
          image: localhost:32000/controller:latest
          args:
            - --interval=30s
            - --max-age=24h
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
