apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ephemeral-environments
  namespace: argocd
  labels:
    ephemeral.io/component: environments
spec:
  project: default
  source:
    repoURL: https://github.com/dusttostars/vcluster-ephemeral-envs.git
    targetRevision: HEAD
    path: manifests/environments
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
