apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ephemeral-tenants
  namespace: argocd
  labels:
    ephemeral.io/component: tenants
spec:
  project: default
  source:
    repoURL: https://github.com/willsbctm/vcluster-ephemeral-envs.git
    targetRevision: HEAD
    path: manifests/tenants
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
