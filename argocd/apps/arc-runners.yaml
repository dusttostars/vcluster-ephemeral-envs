apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-set
  namespace: argocd
  labels:
    ephemeral.io/component: arc
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.9.*
    helm:
      values: |
        # Replace with your GitHub config URL and PAT/GitHub App credentials.
        githubConfigUrl: "https://github.com/willsbctm/vcluster-ephemeral-envs"
        githubConfigSecret:
          github_token: "REPLACE_WITH_PAT"
        maxRunners: 5
        minRunners: 1
        containerMode:
          type: "dind"
        template:
          spec:
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
